[tools]
go = "1.23"
node = "22"

[tasks.verbosetest]
description = "Run tests with colored, human-readable output"
# Usage:
#   mise run verbosetest                                    - run all tests
#   mise run verbosetest ./internal/game/                   - run tests in a package
#   mise run verbosetest -- ./internal/game/ -run TestCompare  - run specific tests
run = "gotestsum --format testdox -- {{arg(name=\"target\", default=\"./...\")}}"
